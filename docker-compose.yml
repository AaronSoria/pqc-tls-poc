services:
  oqs-server:
    build: ./oqs-server
    container_name: oqs-server
    volumes:
      - ./certs:/app
    ports:
      - "9443:9443"
    networks:
      - pqc-net

  classical-server:
    image: alpine
    container_name: classical-server
    command: >
      sh -c "
      apk add --no-cache openssl &&
      openssl req -x509 -newkey rsa:2048 -keyout key.pem -out cert.pem -nodes -subj '/CN=localhost' &&
      openssl s_server -cert cert.pem -key key.pem -accept 8443 -www -ign_eof
      "
    ports:
      - "8443:8443"
    networks:
      - pqc-net

  aws-pq-server:
    build:
      context: ./aws-pq-server
    container_name: aws-pq-server
    volumes:
      - ./certs:/certs
    ports:
      - "10443:10443"
    networks:
      - pqc-net

  benchmark:
    build:
      context: .
      dockerfile: Dockerfile.benchmark
    container_name: benchmark
    depends_on:
      - oqs-server
      - classical-server
      - aws-pq-server
    environment:
      CLASSICAL_HOST: classical-server
      CLASSICAL_PORT: 8443
      PQC_HOST: oqs-server
      PQC_PORT: 9443
      AWS_PQ_HOST: aws-pq-server
      AWS_PQ_PORT: 10443
      ITERATIONS: 20
    volumes:
      - ./results:/results
    command: >
      sh -c "
      echo 'Waiting for servers...' &&
      until nc -z classical-server 8443; do sleep 1; done &&
      until nc -z oqs-server 9443; do sleep 1; done &&
      until nc -z aws-pq-server 10443; do sleep 1; done &&
      echo 'All servers ready. Running benchmark...' &&
      /usr/local/bin/benchmark
      "
    networks:
      - pqc-net

networks:
  pqc-net:
